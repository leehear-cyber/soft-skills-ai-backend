<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>AI Coach: ลานประลอง Soft Skills</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1e1e1e; color: #333; margin: 0; padding: 20px; display: flex; justify-content: center; }
        #chat-container { width: 100%; max-width: 650px; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; overflow: hidden; }
        .header { background: #d32f2f; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 1.2em; }
        #chat-box { height: 450px; padding: 20px; overflow-y: auto; background: #f5f5f5; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 18px; border-radius: 15px; max-width: 85%; line-height: 1.5; font-size: 0.95em; }
        .msg.user { background: #e3f2fd; align-self: flex-end; border-bottom-right-radius: 0; border: 1px solid #bbdefb; }
        .msg.bot { background: white; align-self: flex-start; border-bottom-left-radius: 0; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 4px solid #d32f2f; }

        /* สไตล์สำหรับกล่องคะแนน */
        .assessment-badge { display: inline-block; background: #ffebee; color: #c62828; padding: 5px 10px; border-radius: 8px; font-weight: bold; font-size: 0.85em; margin-bottom: 8px; border: 1px solid #ffcdd2; }
        .weakness-tag { background: #fff3e0; color: #ef6c00; padding: 3px 8px; border-radius: 5px; font-size: 0.8em; margin-left: 5px; border: 1px solid #ffe0b2; }

        .msg.system { background: #ffcccc; align-self: center; font-size: 0.8em; color: #cc0000; border-radius: 5px; }
        #input-area { display: flex; padding: 15px; background: #fff; border-top: 1px solid #ddd; }
        #message-input { flex: 1; padding: 12px 15px; border: 1px solid #ccc; border-radius: 25px; outline: none; font-size: 1em; transition: 0.3s; }
        #message-input:focus { border-color: #d32f2f; box-shadow: 0 0 5px rgba(211,47,47,0.3); }
        #send-btn { background: #d32f2f; color: white; border: none; padding: 10px 25px; margin-left: 10px; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 1em; transition: 0.3s; }
        #send-btn:hover { background: #b71c1c; }
        #send-btn:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div id="chat-container">
    <div class="header">🔥 ลานประลอง Soft Skills (โหมดจำลองสถานการณ์)</div>
    <div id="chat-box">
        <div class="msg bot">
            ยินดีต้อนรับสู่ลานประลอง คุณมีเวลาไม่มาก พิสูจน์ตัวเองมาว่าคุณพร้อมสำหรับโลกการทำงานแค่ไหน พิมพ์สถานการณ์ที่คุณอยากฝึก (เช่น "อยากฝึกสัมภาษณ์งาน" หรือ "อยากฝึกนำเสนอโปรเจกต์")
        </div>
    </div>
    <div id="input-area">
        <input type="text" id="message-input" placeholder="พิมพ์ข้อความตอบกลับที่นี่..." onkeypress="handleEnter(event)">
        <button id="send-btn" onclick="sendMessage()">ส่ง</button>
    </div>
</div>

<script>
    let currentSessionId = "";

    function handleEnter(e) {
        if (e.key === 'Enter') sendMessage();
    }

    async function sendMessage() {
        const inputField = document.getElementById("message-input");
        const sendBtn = document.getElementById("send-btn");
        const message = inputField.value.trim();
        if (!message) return;

        // 1. แสดงข้อความผู้ใช้
        addRawMessage(message, "user");
        inputField.value = "";

        inputField.disabled = true;
        sendBtn.disabled = true;
        sendBtn.innerText = "กำลังวิเคราะห์...";

        try {
            // 2. ยิง API หาหลังบ้าน
            const response = await fetch("http://127.0.0.1:8000/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    session_id: currentSessionId,
                    message: message
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.detail || "เซิร์ฟเวอร์ขัดข้อง");
            }

            const data = await response.json();
            currentSessionId = data.session_id;

            // 3. แยกกล่องข้อมูล JSON เอามาปั้นเป็น UI สวยๆ
            const aiReply = data.assessment.reply;
            const aiScore = data.assessment.score;
            const aiWeakness = data.assessment.weakness;

            // สร้าง HTML สำหรับแสดงคะแนนและจุดอ่อน
            const formattedHTML = `
                <div class="assessment-badge">คะแนน: ${aiScore}/10</div>
                <span class="weakness-tag">จุดบอด: ${aiWeakness}</span>
                <br><br>
                ${aiReply.replace(/\n/g, '<br>')}
            `;

            addRawMessage(formattedHTML, "bot");

        } catch (error) {
            addRawMessage(`Error: ${error.message}`, "system");
        } finally {
            inputField.disabled = false;
            sendBtn.disabled = false;
            sendBtn.innerText = "ส่ง";
            inputField.focus();
        }
    }

    function addRawMessage(htmlContent, sender) {
        const chatBox = document.getElementById("chat-box");
        const msgDiv = document.createElement("div");
        msgDiv.className = `msg ${sender}`;
        msgDiv.innerHTML = htmlContent;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
